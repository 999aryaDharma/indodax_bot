name: Test SSH Connection

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test-ssh:
    name: Test SSH to GCP VM
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          # Gunakan printf untuk memastikan newline benar
          printf '%s\n' "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/gcp_key
          chmod 600 ~/.ssh/gcp_key
          
          # Validate SSH key
          echo "🔑 Validating SSH key..."
          if ssh-keygen -y -f ~/.ssh/gcp_key > /dev/null 2>&1; then
            echo "✅ SSH key valid!"
          else
            echo "❌ SSH key INVALID! Check GitHub Secret format."
            exit 1
          fi
          
          ssh-keyscan -H ${{ secrets.GCP_VM_EXTERNAL_IP }} >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        env:
          VM_USER: ${{ secrets.GCP_VM_USER }}
          VM_IP: ${{ secrets.GCP_VM_EXTERNAL_IP }}
        run: |
          echo "🔍 Testing SSH connection..."
          echo "📍 User: $VM_USER"
          echo "📍 IP: $VM_IP"

          # Test 1: Simple whoami command
          echo ""
          echo "Test 1: whoami"
          ssh -i ~/.ssh/gcp_key -o StrictHostKeyChecking=no ${VM_USER}@${VM_IP} "whoami"

          # Test 2: Check directory
          echo ""
          echo "Test 2: ls /home/aryadharmawm22/"
          ssh -i ~/.ssh/gcp_key -o StrictHostKeyChecking=no ${VM_USER}@${VM_IP} "ls -la /home/aryadharmawm22/"

          # Test 3: Check git repo
          echo ""
          echo "Test 3: git repo check"
          ssh -i ~/.ssh/gcp_key -o StrictHostKeyChecking=no ${VM_USER}@${VM_IP} "cd /home/aryadharmawm22/indodax_bot && git log -1 --oneline"

          echo ""
          echo "✅ All SSH tests passed!"

      - name: Handle failure
        if: failure()
        run: |
          echo "❌ SSH test failed! Possible issues:"
          echo "1. SSH private key belum di-update di GitHub Secrets"
          echo "2. Public key belum ditambahkan ke VM authorized_keys"
          echo "3. User atau IP salah"
          echo ""
          echo "Solution: Generate key baru, add public key ke VM, update secret."
          exit 1
